# Conversation Intelligence Monitor Configuration
# Secrets should be set via environment variables (see .env.example)

webhook_secret: "${WEBHOOK_SECRET}"

nim:
  api_key: "${NIM_API_KEY}"
  base_url: "https://integrate.api.nvidia.com/v1"
  model: "meta/llama-3.1-70b-instruct"
  timeout_seconds: 30

telegram:
  bot_token: "${TELEGRAM_BOT_TOKEN}"
  chat_id: "${TELEGRAM_CHAT_ID}"

digest:
  schedule: "0 8 * * *"  # daily at 08:00 UTC

alert_defaults:
  dropoff_rate_pct: 50
  consecutive_errors: 3
  low_volume_pct: 50
  consecutive_negative_sentiment: 3
  persistence_count: 3
  cooldown_minutes: 60

inactive_check_interval_minutes: 60
db_path: "/tmp/monitor.db"

clients:
  - client_id: "gjbc"
    display_name: "GJBC Fitness"
    thresholds:
      dropoff_rate_pct: 40
      cooldown_minutes: 90
    active_hours:
      start_time: "06:00"
      end_time: "21:00"
      timezone: "Australia/Sydney"
      days: [0, 1, 2, 3, 4, 5, 6]
