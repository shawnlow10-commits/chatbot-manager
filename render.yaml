services:
  - type: web
    runtime: python
    name: chatbot-monitor
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn chatbot_monitor.main:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: WEBHOOK_SECRET
        sync: false
      - key: NIM_API_KEY
        sync: false
      - key: TELEGRAM_BOT_TOKEN
        sync: false
      - key: TELEGRAM_CHAT_ID
        sync: false
    plan: free
